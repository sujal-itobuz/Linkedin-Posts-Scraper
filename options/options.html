<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkedIn Scraper Settings</title>
    <link rel="stylesheet" href="options.css" />
    <script src="options.js" defer></script>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Extension Settings</h1>
        <p class="subtitle">
          Configure the webhook destination and optional API token.
        </p>
      </header>

      <section class="card">
        <label class="field" for="webhook-url">
          <span>Webhook URL</span>
          <input
            id="webhook-url"
            type="url"
            placeholder="https://example.com/webhook"
            spellcheck="false"
            autocomplete="off"
          />
          <small>Must start with https://</small>
        </label>

        <label class="field" for="api-token">
          <span>API Token (optional)</span>
          <input
            id="api-token"
            type="password"
            placeholder="Paste your token"
            spellcheck="false"
            autocomplete="off"
          />
        </label>

        <div class="actions">
          <button id="save-btn" type="button">Save settings</button>
          <span id="status" role="status"></span>
        </div>
      </section>
    </main>
  </body>
</html>
