<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <h1>LinkedIn Scraper</h1>
      <div class="fields">
        <label class="field">
          <span>Skip</span>
          <input id="skip-input" type="number" min="0" value="0" />
        </label>
        <label class="field">
          <span>Limit</span>
          <input id="limit-input" type="number" min="0" value="50" />
        </label>
      </div>
      <button id="scrape-btn" type="button">Scrape posts</button>
      <p id="status" role="status">Ready.</p>
      <textarea
        id="output"
        readonly
        placeholder="Results will appear here"
      ></textarea>
    </div>
  </body>
</html>
